  <script>
  (function () {
    var overlay = document.querySelector('.page-overlay');
    if (!overlay) return;

    var OVERLAY_DURATION = 1000;

    overlay.getBoundingClientRect();
    setTimeout(function () {
      overlay.classList.add('hidden');
    }, 100);

    setTimeout(function () {
      overlay.style.pointerEvents = 'none';

      var bio = document.querySelector('.bio-section-enter');
      if (bio) bio.classList.add('is-visible');

      var navLinks = document.querySelectorAll('.nav-giant-link');
      navLinks.forEach(function (link, i) {
        setTimeout(function () {
          link.classList.add('is-visible');
        }, i * 50);
      });

    }, OVERLAY_DURATION);

  })();

 // Template card slideshow (carrusel horizontal)
(function() {
  var track = document.querySelector('.slideshow-track');
  if (!track) return;
  
  var slides = document.querySelectorAll('.slide');
  var slideCount = slides.length;
  if (slideCount === 0) return;
  
  var currentIndex = 0;
  var slideInterval = 3000; // Cambia cada 3 segundos
  
  function updateSlidePosition() {
    var translateX = -currentIndex * 100;
    track.style.transform = 'translateX(' + translateX + '%)';
  }
  
  function nextSlide() {
    currentIndex = (currentIndex + 1) % slideCount;
    updateSlidePosition();
  }
  
  // Iniciar carrusel
  var interval = setInterval(nextSlide, slideInterval);
  
  // Pausar carrusel al hacer hover
  var card = document.querySelector('.template-card');
  if (card) {
    card.addEventListener('mouseenter', function() {
      clearInterval(interval);
    });
    
    card.addEventListener('mouseleave', function() {
      interval = setInterval(nextSlide, slideInterval);
    });
  }
})();
</script>
